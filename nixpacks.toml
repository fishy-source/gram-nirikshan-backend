[phases.setup]
nixPkgs = [
  "python311",
  "gcc",
  "libffi",
  "openssl",
  "zlib",
  "libjpeg",
  "freetype",
  "lcms2",
  "libwebp",
  "tcl",
  "tk",
  "libpng",
  "libxml2"
]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
