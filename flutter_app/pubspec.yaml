name: gram_nirikshan
description: "Gram Nirikshan App - Gram Panchayat Inspection & Monitoring"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2
  
  # HTTP Client
  dio: ^5.7.0
  
  # Local Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  
  # Navigation
  go_router: ^14.6.2
  
  # GPS & Maps
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0
  
  # Camera & Photos
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  
  # Image Processing
  image: ^4.2.0
  
  # PDF Generation & Viewing
  pdf: ^3.11.1
  printing: ^5.13.2
  flutter_pdfview: ^1.3.2
  open_file: ^3.5.7
  
  # Voice Input
  speech_to_text: ^7.0.0
  
  # Notifications
  flutter_local_notifications: ^17.2.4
  firebase_messaging: ^15.1.4
  firebase_core: ^3.8.0
  
  # File handling
  file_picker: ^8.1.4
  path_provider: ^2.1.5
  
  # UI Components
  flutter_svg: ^2.0.15
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.2.0
  fl_chart: ^0.70.2
  table_calendar: ^3.1.2
  
  # URL Launcher (WhatsApp/Email share)
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  
  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # Utils
  connectivity_plus: ^6.1.0
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  intl_phone_number_input: ^0.7.4
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
